<svg xmlns="http://www.w3.org/2000/svg" width="1160" height="700" viewBox="0 0 1160 700" role="img" aria-label="VSCode AutoGo Lua Debugger redacted screenshot guide">
  <rect width="1160" height="700" fill="#1f1f1f"/>
  <rect x="0" y="0" width="1160" height="44" fill="#2b2b2b"/>
  <text x="22" y="28" fill="#d4d4d4" font-family="Arial, sans-serif" font-size="16">VSCode - AutoGo Lua Debugger</text>
  <rect x="0" y="44" width="64" height="656" fill="#252526"/>
  <rect x="64" y="44" width="260" height="656" fill="#181818"/>
  <rect x="324" y="44" width="836" height="456" fill="#1e1e1e"/>
  <rect x="324" y="500" width="836" height="200" fill="#151515"/>
  <text x="92" y="86" fill="#c5c5c5" font-family="Arial, sans-serif" font-size="18">AUTO GO</text>
  <rect x="88" y="116" width="200" height="34" rx="6" fill="#0e639c"/>
  <text x="112" y="139" fill="#ffffff" font-family="Arial, sans-serif" font-size="14">Debug 当前 Lua 文件</text>
  <rect x="88" y="166" width="200" height="34" rx="6" fill="#3a3d41"/>
  <text x="112" y="189" fill="#d4d4d4" font-family="Arial, sans-serif" font-size="14">运行当前文件</text>
  <rect x="88" y="216" width="200" height="34" rx="6" fill="#3a3d41"/>
  <text x="112" y="239" fill="#d4d4d4" font-family="Arial, sans-serif" font-size="14">设备：DEVICE_REDACTED</text>
  <rect x="348" y="68" width="250" height="30" fill="#2d2d2d"/>
  <text x="366" y="89" fill="#d4d4d4" font-family="Arial, sans-serif" font-size="14">main.lua</text>
  <text x="356" y="138" fill="#858585" font-family="Menlo, monospace" font-size="16">12</text>
  <circle cx="390" cy="132" r="7" fill="#e51400"/>
  <text x="420" y="138" fill="#dcdcaa" font-family="Menlo, monospace" font-size="16">local</text>
  <text x="475" y="138" fill="#9cdcfe" font-family="Menlo, monospace" font-size="16">result</text>
  <text x="540" y="138" fill="#d4d4d4" font-family="Menlo, monospace" font-size="16">= app.launch(packageName, 0)</text>
  <text x="356" y="174" fill="#858585" font-family="Menlo, monospace" font-size="16">13</text>
  <text x="420" y="174" fill="#dcdcaa" font-family="Menlo, monospace" font-size="16">print</text>
  <text x="470" y="174" fill="#d4d4d4" font-family="Menlo, monospace" font-size="16">("launch", result)</text>
  <rect x="348" y="524" width="260" height="150" fill="#202020" stroke="#3a3a3a"/>
  <text x="366" y="550" fill="#c5c5c5" font-family="Arial, sans-serif" font-size="15">Variables</text>
  <text x="366" y="582" fill="#9cdcfe" font-family="Menlo, monospace" font-size="14">packageName</text>
  <text x="500" y="582" fill="#ce9178" font-family="Menlo, monospace" font-size="14">"com.example.app"</text>
  <text x="366" y="612" fill="#9cdcfe" font-family="Menlo, monospace" font-size="14">result</text>
  <text x="500" y="612" fill="#b5cea8" font-family="Menlo, monospace" font-size="14">true</text>
  <rect x="632" y="524" width="500" height="150" fill="#202020" stroke="#3a3a3a"/>
  <text x="650" y="550" fill="#c5c5c5" font-family="Arial, sans-serif" font-size="15">AutoGo Script Engine Console</text>
  <text x="650" y="584" fill="#d4d4d4" font-family="Menlo, monospace" font-size="14">[Lua] breakpoint hit: [workspace]/script/main.lua:12</text>
  <text x="650" y="614" fill="#d4d4d4" font-family="Menlo, monospace" font-size="14">[Device] serial: DEVICE_REDACTED</text>
  <text x="650" y="644" fill="#d4d4d4" font-family="Menlo, monospace" font-size="14">[Remote] path: /data/local/tmp/.autogo/...</text>
